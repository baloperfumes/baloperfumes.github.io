}
function saveProduct(id){
  const d={name:val('eName').trim(),family:val('eFam').trim(),price:+val('ePrice')||0,salePrice:+val('eSale')||0,stock:+val('eStock')||0,image:val('eImg').trim(),desc:val('eDesc').trim(),top:val('eTop').trim(),heart:val('eHeart').trim(),base:val('eBase').trim(),order:+val('eOrder')||99,size:val('eSize').trim(),special:!!(document.getElementById('eSpecial')&&document.getElementById('eSpecial').classList.contains('on'))};
  if(!d.name){toast('Name required');return;}
  const p=DB.products();
  if(id)Object.assign(p.find(a=>a.id===id),d); else{d.id='p'+Date.now();d.visible=true;p.push(d);}
  const saved=id?p.find(a=>a.id===id):d;
  DB.saveProducts(p);fbSetProduct(saved);closeModal();renderAProducts();renderDash();renderFilters();renderShop();toast('Saved');
}

/* ---------- customers ---------- */
let salesRange='all', salesQ='';
function renderCustomers(){
  const el=document.getElementById('av-customers'); if(!el)return;
  const all=activeOrders();
  const now=Date.now(), today=dayStart(now);
  let sales=all.slice().sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(salesRange==='today') sales=sales.filter(o=>dayStart(o.ts)===today);
  else if(salesRange==='7') sales=sales.filter(o=>o.ts>=today-6*86400000);
  else if(salesRange==='30') sales=sales.filter(o=>o.ts>=today-29*86400000);
  else if(salesRange==='shop') sales=sales.filter(o=>o.mode==='in-shop');
  else if(salesRange==='online') sales=sales.filter(o=>o.mode!=='in-shop');
  if(salesQ){const q=salesQ.toLowerCase();sales=sales.filter(o=>(o.id+' '+o.name+' '+(o.phone||'')+' '+o.items.map(i=>i.name).join(' ')).toLowerCase().includes(q));}
  const rev=sales.reduce((s,o)=>s+o.total,0);
  const units=sales.reduce((s,o)=>s+o.items.reduce((t,i)=>t+i.qty,0),0);
  const inShop=sales.filter(o=>o.mode==='in-shop').length;
  const ranges=[['all','All time'],['today','Today'],['7','7 days'],['30','30 days'],['shop','In-shop'],['online','Online']];
  const byPhone={};
  all.forEach(o=>{
    const k=(o.phone&&o.phone.replace(/\D/g,''))||o.name||'?';
    if(!byPhone[k])byPhone[k]={name:o.name,phone:o.phone||'',count:0,total:0,last:0};
    byPhone[k].count++;byPhone[k].total+=o.total;
    if(o.ts>byPhone[k].last){byPhone[k].last=o.ts;if(o.name)byPhone[k].name=o.name;}
  });
  const custs=Object.values(byPhone).sort((a,b)=>b.total-a.total);
  el.innerHTML=`
    <div class="ahead">Sales record</div>
    <div class="asub">Every sale — boutique and online — with times, details and receipts.</div>
    <div class="tmini">
      <div class="gcard m"><div class="ml">Sales shown</div><div class="mv">${sales.length}</div></div>
      <div class="gcard m"><div class="ml">Revenue</div><div class="mv">${money(rev)}</div></div>
      <div class="gcard m"><div class="ml">Units sold</div><div class="mv">${units}</div></div>
      <div class="gcard m"><div class="ml">In-shop / online</div><div class="mv">${inShop} / ${sales.length-inShop}</div></div>
    </div>
    <div class="afilters">${ranges.map(r=>`<button class="achip ${salesRange===r[0]?'on':''}" data-sr="${r[0]}">${r[1]}</button>`).join('')}
      <div class="asearch"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><input id="salesQ" placeholder="Search sales…" value="${esc(salesQ)}"></div>
      <button class="achip" onclick="exportCSV('sales')">Export CSV</button>
    </div>
    <div class="gcard cpad" style="margin-bottom:16px">
      <div class="ctitle">Sales <span style="text-transform:none;letter-spacing:0">${sales.length?fmtDT(sales[sales.length-1].ts)+' → '+fmtDT(sales[0].ts):''}</span></div>
      ${sales.length?sales.map((o,i)=>`
        <div class="salerow" style="animation-delay:${Math.min(i*22,260)}ms">
          <div class="sl-main">
            <div class="sl-top"><span class="sl-id">${o.id}</span><span class="abadge ${o.status}">${o.status}</span><span class="sl-mode">${o.mode==='in-shop'?'In-shop':(o.mode==='pickup'?'Pickup':'Delivery')}</span></div>
            <div class="sl-meta">${fmtDT(o.ts)} · ${esc(o.name||'Walk-in')}${o.phone?' · '+esc(o.phone):''} · ${esc(o.pay)}</div>
            <div class="sl-items">${o.items.map(i=>i.qty+'× '+esc(i.name)+(i.size?' ('+esc(i.size)+')':'')).join(' · ')}</div>
          </div>
          <div class="sl-side"><span class="sl-tot">${money(o.total)}</span><button class="abtn2" onclick="showReceipt('${o.id}')">Receipt</button></div>
        </div>`).join(''):'<div class="aempty">No sales in this view.</div>'}
    </div>
    <div class="gcard cpad">
      <div class="ctitle">Customers · ${custs.length}</div>
      ${custs.length?custs.map((c,i)=>`
        <div class="cust" style="padding:14px 0;animation-delay:${Math.min(i*30,240)}ms;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.06);border-radius:0;box-shadow:none;margin:0">
          <div class="cav">${esc((c.name||'?').trim().charAt(0).toUpperCase()||'?')}</div>
          <div><div class="cn">${esc(c.name||'Walk-in')}</div><div class="cm">${c.phone?`<a href="tel:${(c.phone||'').replace(/[^+\d]/g,'')}" style="color:inherit">${esc(c.phone)}</a> · `:''}last order ${new Date(c.last).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div></div>
          <div class="cstats"><div class="cv">${money(c.total)}</div><div class="cl">${c.count} order(s)</div></div>
        </div>`).join(''):'<div class="aempty">No customers yet.</div>'}
    </div>`;
  const fb=el.querySelector('.afilters');
  if(fb)fb.addEventListener('click',e=>{const c=e.target.closest('[data-sr]');if(!c)return;salesRange=c.dataset.sr;renderCustomers();});
  const q=document.getElementById('salesQ');
  if(q)q.addEventListener('input',function(){salesQ=this.value.trim();clearTimeout(this._t);this._t=setTimeout(renderCustomers,170);});
}

/* ---------- settings ---------- */
function renderASettings(){
  const el=document.getElementById('av-settings'); if(!el)return;
  const s=getSettings();
  el.innerHTML=`
    <div class="ahead">Settings</div>
    <div style="font-size:11px;letter-spacing:.12em;color:#8a8576;margin:-4px 0 16px">App build ${APP_VERSION}</div>
    <div class="asub">Store configuration.</div>
    <div class="aset">
      <div class="gcard asetcard">
        <h4>Store</h4><div class="sd">Branding, currency and delivery.</div>
        <div class="arow"><label>Store name</label><input id="sName" value="${esc(s.storeName)}"></div>
        <div class="arow"><label>Currency code</label><input id="sCur" value="${esc(s.currency)}"></div>
        <div class="arow"><label>Delivery fee (${esc(s.currency)})</label><input id="sFee" type="number" value="${s.deliveryFee}"></div>
        <div class="arow"><label>Low-stock alert at</label><input id="sLow" type="number" value="${s.lowStock}"></div>
        <div class="arow"><label>Announcement strip (separate with ·)</label><input id="sAnn" value="${esc(s.announce||'')}" placeholder="Complimentary wrapping · Same-day delivery…"></div>
        <div class="atog"><span>Accepting online orders<small>When off, checkout shows a friendly notice.</small></span><div class="aswitch ${s.acceptingOrders!==false?'on':''}" onclick="toggleOpen(this)"><span class="sk"></span></div></div>
        <div class="atog"><span>Show “The Exclusives” rail<small>Featured products appear in a scrolling rail above the shop.</small></span><div class="aswitch ${s.showSpecials!==false?'on':''}" id="setSpecials" onclick="this.classList.toggle('on')"><span class="sk"></span></div></div>
        <button class="asave" onclick="saveStore()">Save store settings</button>
      </div>
      <div class="gcard asetcard">
        <h4>Payments</h4><div class="sd">Methods offered at checkout.</div>
        ${Object.keys(s.pay).map(m=>`<div class="atog"><span>${esc(m)}</span><div class="aswitch ${s.pay[m]?'on':''}" onclick="togglePay('${m}',this)"><span class="sk"></span></div></div>`).join('')}
        <h4 style="margin-top:26px">Data</h4><div class="sd">Take the books with you.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <button class="abtn2" onclick="exportCSV('orders')">Orders CSV</button>
          <button class="abtn2" onclick="exportCSV('sales')">Daily sales CSV</button>
          <button class="abtn2" onclick="exportJSON()">Full backup (JSON)</button>
        </div>
        <h4 style="margin-top:26px">Security</h4><div class="sd">Passcode for this console.</div>
        <div class="arow"><label>Admin passcode</label><input id="sPass" value="${esc(s.adminPass)}"></div>
        <button class="asave" onclick="savePass()">Update passcode</button>
        <div style="height:14px"></div>
        <button class="adanger" onclick="resetData()">Reset all demo data</button>
      </div>
      <div class="gcard asetcard" style="grid-column:1/-1">
        <h4>Cloud database</h4><div class="sd">Firestore keeps every device in sync. If security rules deny writes, changes only live on this device.</div>
        <div id="cloudStatus" style="font-size:13px;margin-bottom:14px">${cloudBlocked?'<span style="color:#e8b6b6">● Writes blocked by security rules</span>':'<span style="color:#8fd8a0">● Connected</span>'}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
          <button class="abtn2" onclick="testCloud()">Test cloud writes</button>
          <button class="abtn2" onclick="copyRules()">Copy recommended rules</button>
        </div>
        <div class="arow"><label>Fix — paste in Firebase console → Firestore Database → Rules</label>
          <textarea id="rulesTxt" readonly rows="8" style="background:rgba(20,20,15,.6);border:1px solid rgba(236,234,227,.16);border-radius:9px;padding:12px 13px;color:rgba(236,234,227,.85);font-family:monospace;font-size:12px;line-height:1.6;resize:vertical">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function admin(){ return request.auth != null && request.auth.token.email == 'admin@baloperfumes.app'; }
    match /products/{id} { allow read: if true; allow create, delete: if admin(); allow update: if admin() || request.resource.data.diff(resource.data).affectedKeys().hasOnly(['stock']); }
    match /config/{id}   { allow read: if true; allow write: if admin(); }
    match /orders/{id}   { allow create: if true; allow read, update, delete: if admin(); }
    match /users/{id}    { allow read, write: if false; }
  }
}</textarea>
        </div>
      </div>
    </div>`;
}
async function testCloud(){
  if(!window._db){toast('Firebase not configured');return;}
  const st=document.getElementById('cloudStatus');
  if(st)st.innerHTML='<span style="color:rgba(236,234,227,.6)">● Testing…</span>';
  try{
    await window._db.collection('config').doc('settings').set({cloudProbe:Date.now()},{merge:true});
    cloudBlocked=false;Store.set('balo_cloud_blocked',false);
    if(st)st.innerHTML='<span style="color:#8fd8a0">● Connected — writes allowed</span>';
    toast('Cloud writes OK');
  }catch(e){
    cloudBlocked=true;Store.set('balo_cloud_blocked',true);
    if(st)st.innerHTML='<span style="color:#e8b6b6">● Blocked ('+(e.code||'denied')+') — update the rules below, then retest</span>';
    toast('Cloud writes blocked');
  }
}
function copyRules(){
  const t=document.getElementById('rulesTxt');
  const txt=t?t.value:'';
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(()=>toast('Rules copied'),()=>{t.select();document.execCommand('copy');toast('Rules copied');});}
  else if(t){t.select();document.execCommand('copy');toast('Rules copied');}
}
function saveStore(){const s=getSettings();s.storeName=val('sName').trim()||'BALO Parfums';s.currency=(val('sCur').trim()||'TZS').toUpperCase();s.deliveryFee=+val('sFee')||0;s.lowStock=+val('sLow')||5;s.announce=val('sAnn').trim();const sp=document.getElementById('setSpecials');if(sp)s.showSpecials=sp.classList.contains('on');saveSettingsObj(s);renderDash();renderAProducts();renderFilters();renderShop();renderMarquee();renderShopSub();toast('Store settings saved');}
function toggleOpen(el){const s=getSettings();s.acceptingOrders=!(s.acceptingOrders!==false);saveSettingsObj(s);el.classList.toggle('on',s.acceptingOrders);toast(s.acceptingOrders?'Online orders open':'Online orders paused');}
function togglePay(m,el){const s=getSettings();const next=!s.pay[m];if(!next&&Object.values(s.pay).filter(Boolean).length<=1){toast('Keep at least one method');return;}s.pay[m]=next;saveSettingsObj(s);el.classList.toggle('on',next);}
function savePass(){const s=getSettings();const v=val('sPass').trim();if(v.length<4){toast('Passcode too short');return;}s.adminPass=v;saveSettingsObj(s);toast('Passcode updated');}
function download(name,content,type){const b=new Blob([content],{type:type||'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},400);}
function csvRow(cells){return cells.map(c=>{c=String(c==null?'':c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',');}
function exportCSV(kind){
  if(kind==='products'){
    const rows=[csvRow(['id','name','family','price','salePrice','stock','visible','order'])];
    DB.products().forEach(p=>rows.push(csvRow([p.id,p.name,p.family,p.price,p.salePrice||'',p.stock,p.visible,p.order])));
    download('balo-products.csv',rows.join('\n'),'text/csv');
  } else if(kind==='sales'){
    const rows=[csvRow(['id','date','time','mode','status','customer','phone','payment','items','units','total'])];
    activeOrders().slice().sort((a,b)=>(b.ts||0)-(a.ts||0)).forEach(o=>{
      const d=new Date(o.ts);
      rows.push(csvRow([o.id,d.toISOString().slice(0,10),d.toTimeString().slice(0,5),o.mode||'',o.status||'',o.name||'',o.phone||'',o.pay||'',
        o.items.map(i=>i.qty+'x '+i.name+(i.size?' ('+i.size+')':'')).join(' | '),
        o.items.reduce((s,i)=>s+i.qty,0),o.total]));
    });
    download('balo-sales.csv',rows.join('\n'),'text/csv');
  } else if(kind==='sales-daily'){
    const byDay={};activeOrders().forEach(o=>{const d=new Date(dayStart(o.ts)).toISOString().slice(0,10);if(!byDay[d])byDay[d]={orders:0,total:0,inshop:0,online:0};byDay[d].orders++;byDay[d].total+=o.total;if(o.mode==='in-shop')byDay[d].inshop+=o.total;else byDay[d].online+=o.total;});
    const rows=[csvRow(['date','orders','revenue','in-shop','online'])];
    Object.keys(byDay).sort().forEach(d=>rows.push(csvRow([d,byDay[d].orders,byDay[d].total,byDay[d].inshop,byDay[d].online])));
    download('balo-daily-sales.csv',rows.join('\n'),'text/csv');
  } else {
    const rows=[csvRow(['id','date','customer','phone','mode','payment','status','items','total'])];
    DB.orders().forEach(o=>rows.push(csvRow([o.id,new Date(o.ts).toISOString(),o.name,o.phone||'',o.mode,o.pay,o.status,o.items.map(i=>i.qty+'x '+i.name).join(' | '),o.total])));
    download('balo-orders.csv',rows.join('\n'),'text/csv');
  }
  toast('Downloaded');
}
function exportJSON(){download('balo-backup.json',JSON.stringify({exported:new Date().toISOString(),products:DB.products(),orders:DB.orders(),settings:getSettings()},null,2),'application/json');toast('Backup downloaded');}
function resetData(){askConfirm('Reset all demo data?','Products, orders and settings return to defaults — including in the cloud.','Reset everything',()=>{
  Store.set('balo_products',JSON.parse(JSON.stringify(SEED_PRODUCTS)));Store.set('balo_orders',JSON.parse(JSON.stringify(SEED_ORDERS)));Store.set('balo_settings',null);settings=getSettings();CFG.currency=settings.currency;CFG.adminPass=settings.adminPass;
  if(window._db){const db=window._db;const b=db.batch();SEED_PRODUCTS.forEach(p=>b.set(db.collection('products').doc(p.id),p));b.commit().catch(()=>{});db.collection('orders').get().then(s=>{const bb=db.batch();s.forEach(doc=>bb.set(doc.ref,{deleted:true},{merge:true}));SEED_ORDERS.forEach(o=>bb.set(db.collection('orders').doc(o.id),o));bb.commit().catch(()=>{});}).catch(()=>{});fbSetSettings(getSettings());}
  renderAdmin();renderFilters();renderShop();renderMarquee();toast('Data reset');
},'Keep it','warn');}
